name: giftloop
description: GiftLoop - Amigo Oculto App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # ── State management ────────────────────────────────────────────────
  provider: ^6.1.1

  # ── Navigation ──────────────────────────────────────────────────────
  go_router: ^13.0.0

  # ── Storage local (mantido para LocalEventRepository) ───────────────
  shared_preferences: ^2.2.2

  # ── Firebase core ───────────────────────────────────────────────────
  firebase_core: ^3.6.0

  # ── Firebase Auth (Google Sign-In + OTP SMS) ─────────────────────────
  firebase_auth: ^5.3.0
  google_sign_in: ^6.2.0

  # ── Cloud Firestore ──────────────────────────────────────────────────
  cloud_firestore: ^5.4.0

  # ── Utilitários ─────────────────────────────────────────────────────
  uuid: ^4.3.3
  url_launcher: ^6.3.0
  crypto: ^3.0.3
  intl: ^0.20.2
  flutter_localizations:
    sdk: flutter
  google_fonts: ^8.0.2

  # ── UI / Animações ───────────────────────────────────────────────────
  flutter_animate: ^4.5.0
  cupertino_icons: ^1.0.6
  confetti: ^0.7.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/